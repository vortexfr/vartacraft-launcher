name: Build Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Decode & import certificate
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}")
          [IO.File]::WriteAllBytes("build/vartacraft.pfx", $bytes)
          $pwd = ConvertTo-SecureString -String "${{ secrets.WINDOWS_CERT_PASSWORD }}" -Force -AsPlainText
          Import-PfxCertificate -FilePath "build/vartacraft.pfx" -CertStoreLocation Cert:\LocalMachine\My -Password $pwd
        shell: pwsh
      - name: Build & sign
        run: npm run package:win
        env:
          ELECTRON_BUILDER_NO_PUBLISH_ON_PR: true
          EP_DRAFT: false
          CSC_LINK: build/vartacraft.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run package:mac
        env:
          ELECTRON_BUILDER_NO_PUBLISH_ON_PR: true
          EP_DRAFT: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run package:linux
        env:
          ELECTRON_BUILDER_NO_PUBLISH_ON_PR: true
          EP_DRAFT: false
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.AppImage